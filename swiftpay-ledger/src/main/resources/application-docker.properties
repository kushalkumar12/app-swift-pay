spring.application.name=swiftpay-ledger
server.port=8882


# DATABASE (PostgreSQL)

spring.datasource.url=jdbc:postgresql://postgres:5432/swiftpay
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# KAFKA CONFIG

spring.kafka.bootstrap-servers=kafka:9092

# -------- PRODUCER (for success/failed topics)
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# IMPORTANT (avoid class mismatch issue)
spring.kafka.producer.properties.spring.json.add.type.headers=false

# -------- CONSUMER (for payment.initiated)
spring.kafka.consumer.group-id=ledger-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# CRITICAL (fix for PaymentEvent deserialization)
spring.kafka.consumer.properties.spring.json.value.default.type=com.swiftpay.ledger.dto.PaymentEventDTO
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# -------- LISTENER
spring.kafka.listener.ack-mode=manual


# REDIS CONFIG (for idempotency)

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# Optional but useful
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1


# ERROR HANDLING

server.error.include-stacktrace=never
server.error.include-message=always


# LOGGING

logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.data.redis=INFO

#
spring.sql.init.mode=always