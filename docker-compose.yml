version: '3.8'

services:

  # ===============================
  # INFRASTRUCTURE
  # ===============================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2.5
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    image: postgres:16.3-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: swiftpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ===============================
  # APPLICATIONS
  # ===============================

  swiftpay-gateway:
    build:
      context: ./swiftpay-transaction-gateway
      dockerfile: Dockerfile
    container_name: swiftpay-gateway
    ports:
      - "8881:8881"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
      - kafka
      - redis

  swiftpay-ledger:
    build:
      context: ./swiftpay-ledger
      dockerfile: Dockerfile
    container_name: swiftpay-ledger
    ports:
      - "8882:8882"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
      - kafka
      - redis

  swiftpay-analytics:
    build:
      context: ./swiftpay-analytics
      dockerfile: Dockerfile
    container_name: swiftpay-analytics
    ports:
      - "8883:8883"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
      - kafka

volumes:
  postgres_data: