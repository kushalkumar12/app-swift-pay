spring.application.name=swiftpay-transaction-gateway

server.port=8881

# ===============================

# DATABASE (PostgreSQL)

# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/swiftpay
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================

# ERROR HANDLING

# ===============================

server.error.include-stacktrace=never
server.error.include-message=never

# ===============================

# KAFKA CONFIG

# ===============================

spring.kafka.bootstrap-servers=localhost:9092

# Producer

spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer

spring.kafka.consumer.group-id=swiftpay-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Required for JSON deserialization

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Listener (manual ack for better control)

spring.kafka.listener.ack-mode=manual

# ===============================

# REDIS CONFIG

# ===============================

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# ===============================

# LOGGING (Optional but helpful)

# ===============================

logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.data.redis=INFO

# External service
ledger.service.url=http://localhost:8882
management.endpoints.web.exposure.include=health
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
